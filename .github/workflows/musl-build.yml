name: musl-build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: musl-build-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: bosun-client

permissions:
  contents: write

jobs:
  musl-build:
    name: musl-build (x86_64)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static musl binary in rust:alpine
        # `make musl-docker` builds bosun inside rust:1-alpine; the host needs
        # only docker. Result lands in target/musl-release/bosun.
        run: make musl-docker TARGET=x86_64-unknown-linux-musl

      - name: Inspect produced binary
        run: |
          file target/musl-release/bosun
          ldd target/musl-release/bosun 2>&1 || true
          ls -lh target/musl-release/bosun

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bosun-x86_64-unknown-linux-musl
          path: bosun-client/target/musl-release/bosun
          if-no-files-found: error
          retention-days: 30

      - name: Attach binary to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: bosun-client/target/musl-release/bosun
          fail_on_unmatched_files: true
