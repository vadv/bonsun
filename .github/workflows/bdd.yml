name: bdd

# BDD scenarios (Phase K) — главный gate для примитивов через Starlark glue.
# Сборка тяжёлая (test-base image + cucumber на 100+ сценариев), поэтому
# workflow отделён от ci.yml и стреляет на push в main и по dispatch.
#
# В большинстве сценариев участвуют только bosun + системные утилиты
# (apt, useradd, dbus, openssl); runr-supervisor нужен ровно одному
# тегу — @runr-service. runr живёт в приватном gitlab.ozon.ru репозитории,
# public-форк bosun без maintainer-секретов клонировать его не может.
# Поэтому workflow всегда запускает BDD и только переключается между
# двумя режимами:
# - есть RUNR_REPO_URL+RUNR_DEPLOY_KEY → клонируем runr, собираем
#   test-base с runr-бинарём, прогоняем все теги;
# - секретов нет → собираем test-base без runr, прогоняем «not @runr-service».
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tags:
        description: 'Cucumber tag expression to filter scenarios (e.g. @apt-package, or "@apt-package and not @todo-skip")'
        required: false
        default: ''

concurrency:
  group: bdd-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

defaults:
  run:
    working-directory: bosun-client

jobs:
  bdd-default:
    name: bdd (default scenarios)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify docker available
        run: docker version

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: bosun-client

      - name: Check runr source availability
        id: runr_check
        env:
          RUNR_REPO_URL: ${{ secrets.RUNR_REPO_URL }}
          RUNR_DEPLOY_KEY: ${{ secrets.RUNR_DEPLOY_KEY }}
        run: |
          if [ -z "$RUNR_REPO_URL" ] || [ -z "$RUNR_DEPLOY_KEY" ]; then
            echo "::notice::RUNR_REPO_URL/RUNR_DEPLOY_KEY secrets not set; BDD без @runr-service сценариев"
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "$RUNR_DEPLOY_KEY" > ~/.ssh/runr_id
          chmod 600 ~/.ssh/runr_id
          ssh-keyscan -t rsa,ecdsa,ed25519 gitlab.ozon.ru >> ~/.ssh/known_hosts 2>/dev/null || true
          GIT_SSH_COMMAND="ssh -i ~/.ssh/runr_id -o IdentitiesOnly=yes" \
            git clone --depth 1 "$RUNR_REPO_URL" "$GITHUB_WORKSPACE/runr-src"
          echo "available=true" >> "$GITHUB_OUTPUT"
          echo "RUNR_SOURCE_DIR=$GITHUB_WORKSPACE/runr-src" >> "$GITHUB_ENV"

      - name: Build bosun (bookworm)
        run: make bosun-bookworm

      - name: Build test-base image (with runr)
        if: steps.runr_check.outputs.available == 'true'
        run: make docker-base

      - name: Build test-base image (without runr)
        if: steps.runr_check.outputs.available != 'true'
        # RUNR_SOURCE_DIR пустой → docker-base собирает --target=base.
        # Makefile подхватит ../../runr на dev-машинах; для CI явно
        # обнуляем переменную, чтобы исключить случайное обнаружение.
        run: RUNR_SOURCE_DIR= make docker-base

      - name: Run BDD (full coverage, runr available)
        if: steps.runr_check.outputs.available == 'true'
        env:
          BDD_INPUT_TAGS: ${{ github.event.inputs.tags }}
        run: |
          if [ -n "$BDD_INPUT_TAGS" ]; then
            make test-bdd TAGS="$BDD_INPUT_TAGS"
          else
            make test-bdd
          fi

      - name: Run BDD (без @runr-service, runr недоступен)
        if: steps.runr_check.outputs.available != 'true'
        env:
          BDD_INPUT_TAGS: ${{ github.event.inputs.tags }}
        # RUNR_SOURCE_DIR пустой → Makefile дописывает `not @runr-service`
        # к итоговому фильтру независимо от TAGS. Это покрывает ~80
        # сценариев из 90+ без приватного runr.
        run: |
          if [ -n "$BDD_INPUT_TAGS" ]; then
            RUNR_SOURCE_DIR= make test-bdd TAGS="$BDD_INPUT_TAGS"
          else
            RUNR_SOURCE_DIR= make test-bdd
          fi

  bdd-systemd-privileged:
    name: bdd (@systemd-privileged scenarios)
    runs-on: ubuntu-22.04
    # @systemd-privileged сценарии гоняют systemd как PID 1 внутри
    # `docker run --privileged --cgroupns=private`. Стандартный
    # ubuntu-22.04 GitHub runner это поддерживает; rootless self-hosted —
    # нет. Сценарии общаются с PID 1 через dbus и не используют runr —
    # поэтому job собирает test-base без runr-бинаря и работает на
    # public-репе без приватных секретов.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify privileged docker
        # Probe ловит хосты без privileged-режима до основной сборки.
        run: |
          docker run --rm --privileged debian:bookworm-slim true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: bosun-client

      - name: Build bosun (bookworm)
        run: make bosun-bookworm

      - name: Build test-base image (without runr)
        # systemd-сценариям runr не нужен; принудительно отключаем
        # автоопределение, чтобы dev-layout не тащил runr в этот job.
        run: RUNR_SOURCE_DIR= make docker-base

      - name: Run BDD (@systemd-privileged only)
        run: RUNR_SOURCE_DIR= make test-bdd-systemd
