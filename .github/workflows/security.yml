name: security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly run picks up newly published advisories even when no code changes.
    - cron: '17 6 * * 1'
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    working-directory: bosun-client

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        # Prebuilt binary from rustsec/audit-check upstream; avoids a multi-minute
        # source build of cargo-audit on every run.
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Run cargo audit
        # RUSTSEC-2023-0071 (rsa Marvin Attack) пока без upstream fix.
        # cert.tls использует rsa только для локальной генерации self-signed
        # keys без timing-sensitive операций над untrusted input. Когда
        # upstream выпустит fix — убрать --ignore синхронно с audit.toml и
        # deny.toml. cargo-audit не всегда подхватывает audit.toml из CWD —
        # дублируем через CLI флаг для надёжности.
        run: cargo audit --ignore RUSTSEC-2023-0071

  deny:
    name: cargo deny
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Run cargo deny
        run: cargo deny --all-features check
