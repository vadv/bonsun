[package]
name = "bosun-primitives"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[lints]
workspace = true

[dependencies]
bosun-core = { path = "../bosun-core" }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
# tempfile нужен в Phase 6.1 для atomic-write (NamedTempFile + persist) в file.content::apply.
# Tests внутри крейта получают его транзитивно через [dependencies], дубль в [dev-dependencies] не нужен.
tempfile = { workspace = true }
minijinja = { workspace = true }
libc = { workspace = true }
chrono = { workspace = true }
# fs4 — advisory file-lock через flock(2) для apt.package dpkg-lock probe
# (`/var/lib/dpkg/lock-frontend`). Тот же crate уже использован в bosun-cli
# для per-host bosun-lock; кросс-platform не нужно, но дублирование с std
# было бы дороже сопровождать.
fs4 = { workspace = true }
# rand — джиттер backoff'ов в apt-get update retry-loop'е. На 60k нодах
# фиксированный backoff пробивает mirror одинаковым залпом; ±25% jitter
# размазывает retry'и по времени.
rand = { workspace = true }

[dev-dependencies]
# CancellationToken нужен для конструирования PlanCtx/ApplyCtx в unit-тестах
# file.content::apply. В production-коде это поле приходит из CLI через
# `tokio::signal`, не из bosun-primitives.
tokio-util = { workspace = true }
